# Database Configuration - Docker Environment
jdbc.driver=com.mysql.cj.jdbc.Driver
jdbc.url=jdbc:mysql://mysql:3306/pet_adoption?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_unicode_ci
jdbc.username=petadmin
jdbc.password=petadmin123

# HikariCP Configuration
hikari.minimum-idle=5
hikari.maximum-pool-size=20
hikari.idle-timeout=300000
hikari.max-lifetime=1800000
hikari.connection-timeout=30000

# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.petadoption.entity
mybatis.configuration.map-underscore-to-camel-case=true

# JWT Configuration
jwt.secret=PetAdoptionSecretKey2026ForJWTTokenGenerationMustBeAtLeast32Chars
jwt.expiration=86400000
jwt.remember-expiration=604800000

# File Upload
file.upload.max-size=10485760
