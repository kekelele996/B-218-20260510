version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: pet-adoption-mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: pet_adoption
      MYSQL_USER: petadmin
      MYSQL_PASSWORD: petadmin123
      LANG: C.UTF-8
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # 初始化脚本：Docker启动时自动执行
      # MySQL会按字母顺序执行docker-entrypoint-initdb.d目录下的.sql和.sh文件
      - ./backend/src/main/resources/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/src/main/resources/sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    networks:
      - pet-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务 (Spring MVC + Tomcat)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pet-adoption-backend
    ports:
      - "8000:8080"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=pet_adoption
      - MYSQL_USER=petadmin
      - MYSQL_PASSWORD=petadmin123
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - pet-network

  # 前端服务 - 开发模式 (热更新)
  frontend:
    image: node:20-alpine
    container_name: pet-adoption-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    networks:
      - pet-network

volumes:
  mysql_data:
  frontend_node_modules:

networks:
  pet-network:
    driver: bridge
